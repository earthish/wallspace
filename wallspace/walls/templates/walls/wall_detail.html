{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<h2>{{ wall.title }}</h2>

<div class="d-flex gap-2 mb-3">

    <button
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#addNoteModal">

        + Add Note

    </button>

    <button class="btn btn-danger">
        Delete Wall
    </button>

</div>
<div
    class="modal fade"
    id="addNoteModal"
    tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Add Note
                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <form method="POST">

                {% csrf_token %}

                <div class="modal-body">

                    <input
                        type="text"
                        name="title"
                        class="form-control mb-3"
                        placeholder="Title">

                    <textarea
                        name="content"
                        class="form-control mb-3"
                        placeholder="Write your note..."
                        rows="4">
                    </textarea>

                    <select
                        name="color"
                        class="form-select">

                        <option value="yellow">
                            Yellow
                        </option>

                        <option value="pink">
                            Pink
                        </option>

                        <option value="lightblue">
                            Blue
                        </option>

                        <option value="lightgreen">
                            Green
                        </option>

                    </select>

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Close

                    </button>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Add Note

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>


<hr>

<div
    class="wall-board p-4"
    style="
        height:700px;
        position:relative;
        overflow:hidden;
    ">

    {% for note in notes %}

        <div
            class="note"
            data-note-id="{{ note.id }}"

            style="
                width:200px;
                position:absolute;

                left:{{ note.x_position }}px;
                top:{{ note.y_position }}px;

                background-color:{{ note.color }};
                cursor:grab;
            ">

            <div class="note-title">
                {{ note.title }}
            </div>

            <div class="note-content">
                {{ note.content }}
            </div>

        </div>

    {% empty %}

        <p>No notes yet.</p>

    {% endfor %}

</div>

<br>

<a
    href="{% url 'home' %}"
    class="btn btn-secondary">

    Back

</a>

{% endblock %}


{% block scripts %}

<script>

interact('.note').draggable({

    listeners: {

        move(event) {

            const target =
                event.target;

            let left =
                parseFloat(
                    target.style.left
                ) || 0;

            let top =
                parseFloat(
                    target.style.top
                ) || 0;

            left += event.dx;
            top += event.dy;

            target.style.left =
                `${left}px`;

            target.style.top =
                `${top}px`;
        },

        end(event) {

            const target =
                event.target;

            const noteId =
                target.dataset.noteId;

            const left =
                parseFloat(
                    target.style.left
                );

            const top =
                parseFloat(
                    target.style.top
                );

            fetch(
                '/notes/update-position/',
                {
                    method: 'POST',

                    headers: {
                        'Content-Type':
                            'application/json',

                        'X-CSRFToken':
                            '{{ csrf_token }}'
                    },

                    body: JSON.stringify({
                        note_id: noteId,
                        x: left,
                        y: top
                    })
                }
            );
        }
    }
});

</script>

{% endblock %}
