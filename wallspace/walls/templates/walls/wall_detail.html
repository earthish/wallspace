{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<h2>{{ wall.title }}</h2>

<hr>

<form method="POST">
    {% csrf_token %}

    {{ form|crispy }}

    <button
        class="btn btn-primary"
        type="submit">

        Add Note

    </button>
</form>

<hr>

<div
    class="border rounded p-4"
    style="
        height:700px;
        position:relative;
        overflow:hidden;
    ">

    {% for note in notes %}

        <div
            class="card p-2 note"
            data-note-id="{{ note.id }}"

            style="
                width:200px;
                position:absolute;

                left:{{ note.x_position }}px;
                top:{{ note.y_position }}px;

                background-color:{{ note.color }};
                cursor:grab;
            ">

            <strong>
                {{ note.title }}
            </strong>

            <p>
                {{ note.content }}
            </p>

        </div>

    {% empty %}

        <p>No notes yet.</p>

    {% endfor %}

</div>

<br>

<a
    href="{% url 'home' %}"
    class="btn btn-secondary">

    Back

</a>

{% endblock %}


{% block scripts %}

<script>

interact('.note').draggable({

    listeners: {

        move(event) {

            const target =
                event.target;

            let left =
                parseFloat(
                    target.style.left
                ) || 0;

            let top =
                parseFloat(
                    target.style.top
                ) || 0;

            left += event.dx;
            top += event.dy;

            target.style.left =
                `${left}px`;

            target.style.top =
                `${top}px`;
        },

        end(event) {

            const target =
                event.target;

            const noteId =
                target.dataset.noteId;

            const left =
                parseFloat(
                    target.style.left
                );

            const top =
                parseFloat(
                    target.style.top
                );

            fetch(
                '/notes/update-position/',
                {
                    method: 'POST',

                    headers: {
                        'Content-Type':
                            'application/json',

                        'X-CSRFToken':
                            '{{ csrf_token }}'
                    },

                    body: JSON.stringify({
                        note_id: noteId,
                        x: left,
                        y: top
                    })
                }
            );
        }
    }
});

</script>

{% endblock %}
