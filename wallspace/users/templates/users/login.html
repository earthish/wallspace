{% extends "base.html" %}
{% block nav_buttons %}{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="pixel-card" style="width: 400px;">

        <h2 class="mb-4">Login</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary mt-2">Login</button>
        </form>

        <p class="pixel-empty mb-0 mt-3">
            don't have an account?
            <a href="{% url 'register' %}" class="pixel-auth-link">register here</a>
        </p>

    </div>
</div>

{% endblock %}
